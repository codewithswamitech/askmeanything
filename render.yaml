# Render Blueprint for askmeanything.
#
# Services:
#   - deep-research-db     : managed Postgres (persistent)
#   - deep-research-redis  : managed Key Value / Redis (cache)
#   - crewai-service       : FastAPI backend (private service)
#   - frontend             : Next.js app (public web service)
#
# Secrets marked `sync: false` MUST be filled in the Render dashboard before the
# first deploy — they are intentionally NOT stored in git. SECRET_KEY is
# generated by Render. See DEPLOY.md for the full runbook.

databases:
  - name: deep-research-db
    databaseName: deep_research
    user: deepresearch
    plan: free

services:
  # ── Redis / Key Value ────────────────────────────────────────────────
  - type: keyvalue
    name: deep-research-redis
    plan: free
    ipAllowList: []          # internal only — not reachable from the internet
    maxmemoryPolicy: noeviction

  # ── crewai FastAPI backend ───────────────────────────────────────────
  # Private service: only reachable from other services in this project, never
  # the public internet. (Private services require a paid instance type. To run
  # on the free tier, change `type` to `web` and set the frontend's
  # CREWAI_SERVICE_URL to this service's public https URL instead.)
  - type: pserv
    name: crewai-service
    runtime: docker
    dockerfilePath: ./Dockerfile.crewai
    plan: starter
    envVars:
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        fromDatabase:
          name: deep-research-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: deep-research-redis
          property: connectionString
      - key: SECRET_KEY          # signs JWTs — generated, never in git
        generateValue: true
      - key: AUTH_EMAIL
        sync: false
      - key: AUTH_PASSWORD       # strong password — set in dashboard
        sync: false
      - key: AUTH_DISPLAY_NAME
        value: Admin
      - key: CORS_ORIGINS        # set to the frontend's public URL
        sync: false
      - key: RATE_LIMIT
        value: 10/minute
      # LLM — Azure OpenAI (direct; no local proxy needed on Render)
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        value: "2024-12-01-preview"
      - key: TAVILY_API_KEY
        sync: false

  # ── Next.js frontend ─────────────────────────────────────────────────
  - type: web
    name: frontend
    runtime: docker
    dockerfilePath: ./Dockerfile.web
    plan: starter
    healthCheckPath: /login
    envVars:
      - key: PORT
        value: "3000"
      # Internal address of the private backend (name:port on Render's network).
      - key: CREWAI_SERVICE_URL
        value: http://crewai-service:8000
